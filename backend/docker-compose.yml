services:
  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: wavs-zap
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    command:
      - zap.sh
      - -daemon
      - -host
      - 0.0.0.0
      - -port
      - "8080"
      - -config
      - api.key=${ZAP_API_KEY}
      - -config
      - api.addrs.addr.name=.*
      - -config
      - api.addrs.addr.regex=true
      - -config
      - connection.dnsTtlSuccessfulQueries=-1
