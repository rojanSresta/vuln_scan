services:
  postgres:
    image: postgres:16
    container_name: wavs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wavs
      POSTGRES_USER: wavs
      POSTGRES_PASSWORD: wavs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
